# 打 tag 自动构建 Windows Portable + Setup，并发布到 GitHub Releases
# 用法：
#   git tag v1.0.1 && git push origin v1.0.1
# 要求：package.json / tauri.conf.json / Cargo.toml 版本与 tag 一致（可无 v 前缀）

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "可选：指定已有 tag（如 v1.0.1）；留空则打当前 commit 的 manual-run"
        required: false
        default: ""

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  windows:
    name: Build Windows (Setup + Portable)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.tag }}") {
            "${{ inputs.tag }}"
          } else {
            "${{ github.ref_name }}"
          }
          if ($tag -notmatch '^v?\d+\.\d+\.\d+') {
            throw "Tag 格式应为 vX.Y.Z，当前: $tag"
          }
          $version = $tag.TrimStart('v')
          $pkg = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tauri = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $cargoLine = Select-String -Path src-tauri/Cargo.toml -Pattern '^\s*version\s*=\s*"([^"]+)"' | Select-Object -First 1
          $cargo = $cargoLine.Matches.Groups[1].Value
          Write-Host "tag=$tag version=$version pkg=$pkg tauri=$tauri cargo=$cargo"
          if ($pkg -ne $version -or $tauri -ne $version -or $cargo -ne $version) {
            throw "版本不一致: tag=$version package=$pkg tauri=$tauri cargo=$cargo。请先改三处 version 再打 tag。"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: release-windows

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Rust (release MSVC)
        working-directory: src-tauri
        run: cargo build --release

      - name: Locate executable
        id: exe
        shell: pwsh
        run: |
          $candidates = @(
            "src-tauri\target\release\lumaris.exe",
            "src-tauri\target\release\Lumaris.exe",
            "src-tauri\target\x86_64-pc-windows-msvc\release\lumaris.exe"
          )
          $exe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $exe) {
            Get-ChildItem -Recurse src-tauri\target -Filter *.exe | Select-Object -First 20 FullName
            throw "找不到 release exe"
          }
          Write-Host "exe=$exe"
          "path=$exe" >> $env:GITHUB_OUTPUT

      - name: Package portable zip
        shell: pwsh
        run: |
          .\scripts\package-portable.ps1 -SourceExe "${{ steps.exe.outputs.path }}"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $url = "https://github.com/jrsoftware/issrc/releases/download/is-6_7_3/innosetup-6.7.3.exe"
          $installer = Join-Path $env:RUNNER_TEMP "innosetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART","/SP-" -Wait
          $iscc = Join-Path $env:LOCALAPPDATA "Programs\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) { throw "ISCC 未找到" }
          # 中文语言包（Unofficial）
          $langDir = Join-Path (Split-Path $iscc) "Languages"
          New-Item -ItemType Directory -Force -Path $langDir | Out-Null
          $zh = Join-Path $langDir "ChineseSimplified.isl"
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/is-6_7_3/Files/Languages/Unofficial/ChineseSimplified.isl" -OutFile $zh
          Write-Host "ISCC=$iscc"
          "iscc=$iscc" >> $env:GITHUB_OUTPUT

      - name: Build Setup.exe
        shell: pwsh
        run: |
          $iscc = Join-Path $env:LOCALAPPDATA "Programs\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" }
          $ver = "${{ steps.ver.outputs.version }}"
          & $iscc "/DMyAppVersion=$ver" (Join-Path $pwd "installer\Lumaris.iss")
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed: $LASTEXITCODE" }
          $setup = Get-ChildItem "installer\output\Lumaris-Setup-*.exe" | Select-Object -First 1
          if (-not $setup) { throw "Setup.exe 未生成" }
          Copy-Item -Force $setup.FullName "release\$($setup.Name)"
          Write-Host "setup=$($setup.FullName)"

      - name: SHA256SUMS
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $files = @(
            "release\Lumaris-portable-$ver.zip",
            "release\Lumaris-Setup-$ver.exe"
          )
          $lines = foreach ($f in $files) {
            if (-not (Test-Path $f)) { throw "缺少 $f" }
            $hash = (Get-FileHash -Algorithm SHA256 $f).Hash.ToLower()
            $name = Split-Path $f -Leaf
            "$hash  $name"
          }
          $lines | Set-Content -Encoding ascii "release\SHA256SUMS.txt"
          Get-Content "release\SHA256SUMS.txt"
          Get-ChildItem release | Format-Table Name, Length

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ steps.ver.outputs.tag }}"
          $ver = "${{ steps.ver.outputs.version }}"
          $portable = "release\Lumaris-portable-$ver.zip"
          $setup = "release\Lumaris-Setup-$ver.exe"
          $sums = "release\SHA256SUMS.txt"
          $notes = @"
          ## Lumaris $ver

          ### 下载
          | 包 | 说明 |
          |----|------|
          | ``Lumaris-Setup-$ver.exe`` | 安装包（推荐） |
          | ``Lumaris-portable-$ver.zip`` | 便携版 |

          ### 校验
          见 ``SHA256SUMS.txt``。

          ### 说明
          - Windows 10/11 x64
          - 需要 WebView2 Runtime（系统通常已预装）
          - 许可证：PolyForm Noncommercial 1.0.0（禁止商用）
          "@
          # 若 release 已存在则只上传资产
          $exists = $false
          try {
            gh release view $tag 2>$null | Out-Null
            if ($LASTEXITCODE -eq 0) { $exists = $true }
          } catch { $exists = $false }

          if (-not $exists) {
            gh release create $tag $setup $portable $sums `
              --title "Lumaris $ver" `
              --notes $notes
          } else {
            gh release upload $tag $setup $portable $sums --clobber
          }
