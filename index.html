<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ipc: http://ipc.localhost; font-src 'self' data:;"
    />
    <title>Lumaris</title>
    <style>
      /* 与面板同色铺底，避免圆角抗锯齿露出 WebView 白边；主题由 data-theme 切换 */
      html,
      body {
        margin: 0;
        padding: 0;
        background: rgb(43, 40, 38) !important;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }
      html[data-theme="light"],
      html[data-theme="light"] body {
        background: rgb(243, 243, 243) !important;
      }
      #app {
        opacity: 1;
        background: inherit;
      }
      #app.ready {
        opacity: 1;
      }
    </style>
  </head>
  <body data-theme="dark">
    <div id="app" role="application" aria-label="Lumaris 亮度控制"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
